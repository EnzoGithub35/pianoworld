version: 2
updates:
  # npm : mise à jour hebdomadaire, groupée pour limiter le bruit de PR.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Europe/Paris
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      minor-and-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch
      security:
        applies-to: security-updates
        update-types:
          - minor
          - patch
          - major
    ignore:
      # Verrouillé pour stabilité : major updates faits manuellement
      - dependency-name: react
        update-types: [version-update:semver-major]
      - dependency-name: react-dom
        update-types: [version-update:semver-major]
      - dependency-name: react-router-dom
        update-types: [version-update:semver-major]
      - dependency-name: vite
        update-types: [version-update:semver-major]
      - dependency-name: typescript
        update-types: [version-update:semver-major]

  # GitHub Actions : mise à jour mensuelle
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels:
      - dependencies
      - ci
