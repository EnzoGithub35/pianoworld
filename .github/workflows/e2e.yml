name: E2E Playwright

# Sprint 11 — Tests E2E golden paths Playwright + Supabase local.
# - manual_dispatch : debug/release sanity check
# - schedule cron nightly : catch les régressions silencieuses
# Pas attaché aux PRs pour garder le check rapide (vitest + lint + build = ~3 min).

on:
  workflow_dispatch:
  schedule:
    # Tous les jours à 03:30 UTC (~4:30 Paris, hors heures critiques)
    - cron: '30 3 * * *'

jobs:
  e2e:
    name: Playwright golden paths
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase local stack
        run: supabase start

      - name: Apply schema.sql + seed.sql
        run: |
          export PGPASSWORD=postgres
          psql -h localhost -p 54322 -U postgres -d postgres -f supabase/schema.sql -v ON_ERROR_STOP=1 -q
          psql -h localhost -p 54322 -U postgres -d postgres -f e2e/fixtures/seed.sql -v ON_ERROR_STOP=1 -q

      - name: Build app
        env:
          VITE_SUPABASE_URL: http://localhost:54321
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_LOCAL_ANON_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6InN1cGFiYXNlLWRlbW8iLCJpYXQiOjE2NDE3NjkyMDAsImV4cCI6MTc5OTUzNTYwMH0.dc_X5iR_VP_qT0zsiyj_I_OZ2T9FtRU2BBNWN8Bu4GE' }}
        run: npm run build

      - name: Run Playwright tests
        env:
          VITE_SUPABASE_URL: http://localhost:54321
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_LOCAL_ANON_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6InN1cGFiYXNlLWRlbW8iLCJpYXQiOjE2NDE3NjkyMDAsImV4cCI6MTc5OTUzNTYwMH0.dc_X5iR_VP_qT0zsiyj_I_OZ2T9FtRU2BBNWN8Bu4GE' }}
          E2E_BASE_URL: http://localhost:5173
          E2E_SUPABASE_URL: http://localhost:54321
          CI: true
        run: npm run test:e2e

      - name: Upload Playwright report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Stop Supabase
        if: always()
        run: supabase stop || true
